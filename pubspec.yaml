name: episode_planner
description: Episode Planner - přehled seriálů podle dne v týdnu
publish_to: 'none'
version: 2.0.4+7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.3.2
  http: ^1.2.1
  file_picker: ^8.1.2
  share_plus: ^10.0.0
  path_provider: ^2.1.4
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
    - assets/logos/assets_logos_netflix.png
    - assets/logos/assets_logos_disney.png
    - assets/logos/assets_logos_apple.png
    - assets/logos/assets_logos_max.png
    - assets/logos/assets_logos_prime.png
    - assets/logos/assets_logos_oneplay.png
    - assets/logos/assets_logos_ivysilani.png
    - assets/logos/assets_logos_skyshow.png
